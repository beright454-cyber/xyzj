<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DARJEELING | GALACTIC MAGIC</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Montserrat:wght@900&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; touch-action: none; -webkit-user-select: none; user-select: none; }
        
        :root {
            --gold: #FFD700;
            --pink: #FF00E5;
            --cyan: #00F2FF;
            --dark: #000000;
        }

        body { 
            background: var(--dark);
            height: 100vh; overflow: hidden; 
            display: flex; align-items: center; justify-content: center;
            perspective: 2500px; font-family: 'Montserrat', sans-serif;
        }

        /* FEATURE: GALAXY NEBULA BACKGROUND */
        .galaxy-bg {
            position: fixed; inset: 0; z-index: 0;
            background: 
                radial-gradient(circle at 20% 30%, rgba(157, 0, 255, 0.15) 0%, transparent 50%),
                radial-gradient(circle at 80% 70%, rgba(255, 0, 229, 0.1) 0%, transparent 50%),
                linear-gradient(to bottom right, #000 0%, #050505 100%);
            animation: nebulaShift 20s infinite alternate ease-in-out;
        }
        @keyframes nebulaShift {
            from { transform: scale(1); }
            to { transform: scale(1.1); }
        }

        /* MAGIC PARTICLE CANVAS */
        #magic-canvas {
            position: fixed; inset: 0; z-index: 2;
            pointer-events: none; /* Let clicks pass through to the prism */
        }

        .lens-flare {
            position: fixed; width: 100vw; height: 100vh;
            background: radial-gradient(circle, rgba(255,215,0,0.05) 0%, transparent 70%);
            z-index: 1; pointer-events: none;
        }

        .scene {
            width: 320px; height: 500px;
            position: relative; z-index: 10;
            transform-style: preserve-3d;
        }

        .prism {
            width: 100%; height: 100%;
            position: absolute; transform-style: preserve-3d;
        }

        .face {
            position: absolute;
            width: 260px; height: 450px;
            left: 30px;
            background-color: #050505;
            border-left: 1px solid rgba(255, 215, 0, 0.3);
            border-right: 1px solid rgba(255, 215, 0, 0.3);
            display: flex; flex-direction: column; align-items: center; justify-content: flex-end;
            backface-visibility: visible;
            overflow: hidden;
            mask-image: linear-gradient(to bottom, transparent 0%, black 15%, black 85%, transparent 100%);
        }

        .img-layer {
            position: absolute; inset: 0;
            background-size: cover;
            background-position: center;
            z-index: -1;
            animation: kenBurns 20s infinite alternate ease-in-out;
        }

        @keyframes kenBurns {
            0% { transform: scale(1); }
            100% { transform: scale(1.3); }
        }

        .img-1 { background-image: url('https://lh3.googleusercontent.com/d/1QaO723HNiXAItvPxbgus8WWpUyBCXXnf'); }
        .img-2 { background-image: url('https://lh3.googleusercontent.com/d/1uq_evexLn0ZKYKqq0wDj_BqMrb2cavNO'); }
        .img-3 { background-image: url('https://lh3.googleusercontent.com/d/12wrIMyoFWs7KLch-HoTe3hc5mCzhp0Kg'); }
        .img-4 { background-image: url('https://lh3.googleusercontent.com/d/1DzT8j3O0Sy7_etmYjeT5dAr-tSzR4pVP'); }
        .img-5 { background-image: url('https://lh3.googleusercontent.com/d/1NxVXYsyzeX_0V0LWG3icaBSZCRmA24np'); }

        .side-0 { transform: rotateY(0deg) translateZ(320px); }
        .side-1 { transform: rotateY(45deg) translateZ(320px); }
        .side-2 { transform: rotateY(90deg) translateZ(320px); }
        .side-3 { transform: rotateY(135deg) translateZ(320px); }
        .side-4 { transform: rotateY(180deg) translateZ(320px); }
        .side-5 { transform: rotateY(225deg) translateZ(320px); }
        .side-6 { transform: rotateY(270deg) translateZ(320px); }
        .side-7 { transform: rotateY(315deg) translateZ(320px); }

        .info-panel {
            width: 100%; padding: 40px 20px;
            background: linear-gradient(transparent, rgba(0,0,0,0.8) 80%);
            text-align: center;
        }

        .name {
            font-family: 'Cinzel', serif;
            font-size: 1.6rem; color: var(--gold);
            letter-spacing: 4px; font-weight: 700;
        }

        .sub {
            font-size: 0.7rem; color: #fff;
            letter-spacing: 6px; text-transform: uppercase;
            margin-top: 8px; opacity: 0.8;
        }

        .overlay-shield {
            position: fixed; inset: 0; z-index: 1000;
        }
    </style>
</head>
<body oncontextmenu="return false;">

    <div class="galaxy-bg"></div>
    <div class="lens-flare"></div>
    <canvas id="magic-canvas"></canvas>
    <div class="overlay-shield" id="shield"></div>

    <div class="scene">
        <div class="prism" id="prism">
            <div class="face side-0"><div class="img-layer img-1"></div><div class="info-panel"><div class="name">Darjeeling</div><div class="sub">Premium Tour</div></div></div>
            <div class="face side-1"><div class="img-layer img-2"></div><div class="info-panel"><div class="name">Darjeeling</div><div class="sub">Premium Tour</div></div></div>
            <div class="face side-2"><div class="img-layer img-3"></div><div class="info-panel"><div class="name">Darjeeling</div><div class="sub">Premium Tour</div></div></div>
            <div class="face side-3"><div class="img-layer img-4"></div><div class="info-panel"><div class="name">Darjeeling</div><div class="sub">Premium Tour</div></div></div>
            <div class="face side-4"><div class="img-layer img-5"></div><div class="info-panel"><div class="name">Darjeeling</div><div class="sub">Premium Tour</div></div></div>
            <div class="face side-5"><div class="img-layer img-1"></div><div class="info-panel"><div class="name">Darjeeling</div><div class="sub">Premium Tour</div></div></div>
            <div class="face side-6"><div class="img-layer img-2"></div><div class="info-panel"><div class="name">Darjeeling</div><div class="sub">Premium Tour</div></div></div>
            <div class="face side-7"><div class="img-layer img-3"></div><div class="info-panel"><div class="name">Darjeeling</div><div class="sub">Premium Tour</div></div></div>
        </div>
    </div>

    <script>
        const prism = document.getElementById('prism');
        const shield = document.getElementById('shield');
        const canvas = document.getElementById('magic-canvas');
        const ctx = canvas.getContext('2d');
        
        let rotateY = 0;
        let rotateX = -5;
        let isDragging = false;
        let startX, startY, lastY, lastX;
        let particles = [];

        // Resize Canvas
        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        // Particle Class for Magic
        class Particle {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.size = Math.random() * 8 + 2;
                this.speedX = (Math.random() - 0.5) * 4;
                this.speedY = (Math.random() - 0.5) * 4;
                const colors = ['#FFD700', '#00F2FF', '#FF00E5', '#FFFFFF'];
                this.color = colors[Math.floor(Math.random() * colors.length)];
                this.opacity = 1;
            }
            update() {
                this.x += this.speedX;
                this.y += this.speedY;
                this.opacity -= 0.02;
                if (this.size > 0.2) this.size -= 0.1;
            }
            draw() {
                ctx.globalAlpha = this.opacity;
                ctx.fillStyle = this.color;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        const handleMove = (e) => {
            const x = e.touches ? e.touches[0].clientX : e.clientX;
            const y = e.touches ? e.touches[0].clientY : e.clientY;
            
            // Add particles on every move
            for(let i=0; i<3; i++) {
                particles.push(new Particle(x, y));
            }

            if (isDragging) {
                rotateY = lastY + (x - startX) * 0.3;
                rotateX = lastX - (y - startY) * 0.1;
                prism.style.transform = `rotateX(${rotateX}deg) rotateY(${rotateY}deg)`;
            }
        };

        const startMove = (e) => {
            isDragging = true;
            const x = e.touches ? e.touches[0].clientX : e.clientX;
            const y = e.touches ? e.touches[0].clientY : e.clientY;
            startX = x; startY = y;
            lastY = rotateY; lastX = rotateX;
        };

        const stopMove = () => { isDragging = false; };

        shield.addEventListener('mousedown', startMove);
        window.addEventListener('mousemove', handleMove);
        window.addEventListener('mouseup', stopMove);
        shield.addEventListener('touchstart', startMove);
        window.addEventListener('touchmove', handleMove);
        window.addEventListener('touchend', stopMove);

        function animate() {
            // Prism Rotation
            if (!isDragging) {
                rotateY += 0.3;
                prism.style.transform = `rotateX(${rotateX}deg) rotateY(${rotateY}deg)`;
            }

            // Magic Particles
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            for (let i = 0; i < particles.length; i++) {
                particles[i].update();
                particles[i].draw();
                if (particles[i].opacity <= 0) {
                    particles.splice(i, 1);
                    i--;
                }
            }

            requestAnimationFrame(animate);
        }
        animate();
    </script>
</body>
</html>
